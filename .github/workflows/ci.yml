name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Runs only once an ESLint config is present, so the pipeline stays
        # green until linting is wired up, then enforces it automatically.
        run: |
          if [ -f eslint.config.mjs ] || [ -f eslint.config.js ] || [ -f .eslintrc.json ]; then
            npm run lint
          else
            echo "No ESLint config found yet — skipping lint."
          fi

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
